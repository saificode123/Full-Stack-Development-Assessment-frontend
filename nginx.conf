server {
    listen 80;
    server_name full-stack-development-assessment.onrender.com;
    
    # Proxy API requests to backend (for same-domain deployment)
    location /api/ {
        proxy_pass http://127.0.0.1:10000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Required for session cookies
        proxy_pass_request_headers on;
    }
    
    location /admin/ {
        proxy_pass http://127.0.0.1:10000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}